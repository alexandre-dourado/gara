<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>super gara worldo</title>
  <style>
    body {
  background-image: url('https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/fundo.png');
  background-size: cover;        /* faz a imagem cobrir tudo */
  background-position: center;   /* centraliza */
  background-repeat: no-repeat;  /* evita repetir */
  height: 100vh;                 /* garante altura total da tela */
  margin: 0;
}

.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.frame {
  position: absolute;
  max-width: 600px;
  opacity: 0;
}

.frame.active {
  opacity: 1;
}
  </style>
</head>
<body>

<div class="stage">
  <img id="imgA" class="frame active" src="frame_3.png" />
  <img id="imgB" class="frame" src="" />
</div>

<script>
  const frames = [
  "https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/frame_0.png",
  "https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/frame_1.png",
  "https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/frame_2.png",
  "https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/frame_3.png",
  "https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/frame_4.png",
  "https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/frame_5.png",
  "https://raw.githubusercontent.com/alexandre-dourado/gara/refs/heads/main/frame_6.png"
];

let currentFrame = 3;

const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

let showingA = true;
let isSwitching = false;

function getFrameFromX(x) {
  if (x < 0.15) return 0;
  if (x < 0.3) return 1;
  if (x < 0.45) return 2;
  if (x < 0.55) return 3;
  if (x < 0.7) return 4;
  if (x < 0.85) return 5;
  return 6;
}

function switchFrame(newFrame) {
  if (newFrame === currentFrame || isSwitching) return;

  isSwitching = true;

  const nextSrc = frames[newFrame];

  if (showingA) {
    imgB.src = nextSrc;
    imgB.classList.add("active");
    imgA.classList.remove("active");
  } else {
    imgA.src = nextSrc;
    imgA.classList.add("active");
    imgB.classList.remove("active");
  }

  showingA = !showingA;
  currentFrame = newFrame;

  setTimeout(() => {
    isSwitching = false;
  }, 150);
}

document.addEventListener("mousemove", (e) => {
  const x = e.clientX / window.innerWidth;
  const targetFrame = getFrameFromX(x);
  switchFrame(targetFrame);
});
</script>
</body>
</html>
